[alembic]
script_location = alembic
# Atenção: '%' é caractere especial no configparser, por isso o '%' da senha
# precisa ser escapado como '%%' para que Alembic leia corretamente a URL.
sqlalchemy.url = postgresql+asyncpg://master:4*vANL<+SWKKZB%%N@72.60.63.29:4866/arena-master-bd

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

