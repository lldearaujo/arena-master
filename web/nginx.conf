server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Evita cache do HTML da SPA (impede bundle antigo ficar "preso" em produção)
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    try_files $uri =404;
  }

  # Alguns browsers pedem /favicon.ico automaticamente; redireciona para o SVG
  location = /favicon.ico {
    return 302 /favicon.svg;
  }

  # SPA (React Router): sempre cair em index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache para assets estáticos com hash
  location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }
}

